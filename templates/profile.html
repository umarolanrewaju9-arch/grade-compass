{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">

        <!-- Profile Info -->
        <div class="card shadow-sm p-4 mb-4">
            <h5 class="fw-bold border-bottom pb-2">👤 My Profile</h5>
            <form method="POST">
                <input type="hidden" name="action" value="update_profile">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Matric Number</label>
                    <input type="text" name="matric_no" class="form-control"
                        value="{{ current_user.matric_no }}" placeholder="e.g. 2021/12345">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Current Level</label>
                    <select name="level" class="form-select">
                        {% for lvl in ['100L','200L','300L','400L','500L'] %}
                        <option value="{{ lvl }}" {% if current_user.level == lvl %}selected{% endif %}>{{ lvl }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="btn btn-primary w-100">Save Profile</button>
            </form>
        </div>

        <!-- Change Password -->
        <div class="card shadow-sm p-4">
            <h5 class="fw-bold border-bottom pb-2">🔒 Change Password</h5>
            <form method="POST">
                <input type="hidden" name="action" value="change_password">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Current Password</label>
                    <input type="password" name="old_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">New Password</label>
                    <input type="password" name="new_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button class="btn btn-danger w-100">Change Password</button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
